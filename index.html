<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d5c2e">
  <title>Cartão de Visita</title>
  <link rel="stylesheet" href="assets/card.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
<div class="card" id="card"></div>

<script>
const ICON_MAP = {
  whatsapp:  { icon: 'fa-brands fa-whatsapp',    label: 'WhatsApp',  build: v => `https://wa.me/${v.replace(/\D/g,'')}`,       self: false },
  phone:     { icon: 'fa-solid fa-phone',         label: 'Telefone',  build: v => `tel:${v}`,                                   self: true  },
  location:  { icon: 'fa-solid fa-location-dot',  label: 'Endereço',  build: v => `https://maps.google.com/?q=${encodeURIComponent(v)}`, self: false },
  email:     { icon: 'fa-solid fa-envelope',      label: 'E-mail',    build: v => `mailto:${v}`,                                self: true  },
  website:   { icon: 'fa-solid fa-globe',         label: 'Site',      build: v => v,                                            self: false },
  instagram: { icon: 'fa-brands fa-instagram',    label: 'Instagram', build: v => `https://instagram.com/${v.replace('@','')}`, self: false },
  linkedin:  { icon: 'fa-brands fa-linkedin-in',  label: 'LinkedIn',  build: v => v,                                            self: false },
  facebook:  { icon: 'fa-brands fa-facebook-f',   label: 'Facebook',  build: v => v,                                            self: false },
  youtube:   { icon: 'fa-brands fa-youtube',      label: 'YouTube',   build: v => v,                                            self: false },
  tiktok:    { icon: 'fa-brands fa-tiktok',       label: 'TikTok',    build: v => `https://tiktok.com/@${v.replace('@','')}`,   self: false },
};

const CTA_TYPES = new Set(['whatsapp', 'phone']);

async function init() {
  let cfg;
  try {
    const res = await fetch('config.json?v=' + Date.now());
    cfg = await res.json();
  } catch {
    document.getElementById('card').textContent = 'Erro ao carregar config.json';
    return;
  }

  const cardEl = document.getElementById('card');
  applyTheme(cardEl, cfg);

  if ((cfg.model || 'classic') === 'elegant') renderElegant(cardEl, cfg);
  else renderClassic(cardEl, cfg);

  setupVCard(cfg);
  setupShare(cfg);
}

function applyTheme(cardEl, cfg) {
  const pri = cfg.theme?.primaryColor || '#0d5c2e';
  const acc = cfg.theme?.accentColor  || '#1eb854';
  cardEl.style.setProperty('--primary', pri);
  cardEl.style.setProperty('--accent',  acc);
  document.querySelector('meta[name=theme-color]').content = pri;
  document.title = cfg.name || 'Cartão de Visita';

  const c = cfg.colors || {};
  if (c.nameColor)       cardEl.style.setProperty('--name-color',       c.nameColor);
  if (c.professionColor) cardEl.style.setProperty('--profession-color',  c.professionColor);
  if (c.crmColor)        cardEl.style.setProperty('--crm-color',         c.crmColor);
  if (c.labelColor)      cardEl.style.setProperty('--label-color',       c.labelColor);

  if (cfg.background?.type === 'image' && cfg.background?.imageUrl) {
    const opacity = cfg.background.overlayOpacity ?? 0.45;
    cardEl.classList.add('bg-full-image');
    cardEl.style.setProperty('--bg-image', `url("${cfg.background.imageUrl}")`);
    cardEl.style.setProperty('--bg-overlay-color',
      `linear-gradient(rgba(0,0,0,${opacity}),rgba(0,0,0,${opacity}))`);
  }
}

function photoHTML(cfg) {
  if (!cfg.photo) return '';
  return `<img id="profilePhoto" src="${cfg.photo}" alt="Foto de perfil"
    onerror="this.style.display='none';document.getElementById('photoPlaceholder').style.display='flex'">`;
}

// ── Modelo Clássico ──────────────────────────────────────
function renderClassic(cardEl, cfg) {
  const acc = cfg.theme?.accentColor || '#1eb854';
  const visibleLinks = (cfg.links || []).filter(l => l.visible && l.value);
  const iconsHtml = visibleLinks.map(link => {
    const meta = ICON_MAP[link.type];
    if (!meta) return '';
    const href = meta.build(link.value);
    return `<a href="${href}" class="icon-btn" ${meta.self ? '' : 'target="_blank" rel="noopener noreferrer"'}>
      <span class="icon-circle"><i class="${meta.icon}"></i></span>
      <span class="icon-label">${link.label}</span>
    </a>`;
  }).join('');

  cardEl.innerHTML = `
    <div class="card-header">
      <p class="card-logo">Cartão Interativo Digital</p>
      <div class="photo-wrap">
        <div class="photo-placeholder" id="photoPlaceholder"><i class="fa-solid fa-user"></i></div>
        ${photoHTML(cfg)}
      </div>
    </div>
    <div class="card-identity">
      <h1 class="card-name">${cfg.name || ''}</h1>
      <p class="card-profession" style="color:${acc}">${cfg.profession || ''}</p>
      ${cfg.crm ? `<p class="card-crm">${cfg.crm}</p>` : ''}
    </div>
    <div class="divider"></div>
    <div class="icons-grid" id="iconsGrid">${iconsHtml}</div>
    <div class="card-actions">
      <button class="btn-action primary" id="btnSaveContact">
        <i class="fa-solid fa-address-card"></i> Salvar Contato
      </button>
      <button class="btn-action secondary" id="btnShare" style="display:none">
        <i class="fa-solid fa-share-nodes"></i> Compartilhar
      </button>
    </div>
    <div class="card-footer">Toque nos ícones para interagir</div>
  `;
}

// ── Modelo Elegante ──────────────────────────────────────
function renderElegant(cardEl, cfg) {
  cardEl.classList.add('model-elegant');

  const pri = cfg.theme?.primaryColor || '#3d6b6b';
  const acc = cfg.theme?.accentColor  || '#6ba3a3';

  const visibleLinks = (cfg.links || []).filter(l => l.visible && l.value);

  const buttonsHtml = visibleLinks.map(link => {
    const meta = ICON_MAP[link.type];
    if (!meta) return '';
    const href = meta.build(link.value);
    const isCta = CTA_TYPES.has(link.type);
    return `<a href="${href}" class="btn-elegant${isCta ? ' cta' : ''}"
               ${meta.self ? '' : 'target="_blank" rel="noopener noreferrer"'}>
      <i class="${meta.icon}"></i> ${link.label}
    </a>`;
  }).join('');

  const photoContent = cfg.photo
    ? `<img src="${cfg.photo}" alt="Foto" onerror="this.style.display='none'">`
    : `<div class="eg-photo-placeholder"><i class="fa-solid fa-user"></i></div>`;

  cardEl.innerHTML = `
    <div class="eg-header">
      <div class="eg-logo"><i class="fa-solid fa-spa"></i></div>
      <div class="eg-identity">
        <h1 class="card-name">${cfg.name || ''}</h1>
        <p class="card-profession" style="color:${acc}">${cfg.profession || ''}</p>
        ${cfg.crm ? `<p class="card-crm">${cfg.crm}</p>` : ''}
      </div>
    </div>
    <div class="eg-photo-section">
      <div class="eg-watermark"><i class="fa-solid fa-spa"></i></div>
      <div class="eg-photo-ring">${photoContent}</div>
    </div>
    ${cfg.tagline ? `<p class="eg-tagline">${cfg.tagline}</p>` : ''}
    <div class="eg-buttons" id="egButtons">
      ${buttonsHtml}
      <button class="btn-elegant" id="btnSaveContact" style="border-color:var(--primary,#3d6b6b);color:var(--label-color,var(--primary,#3d6b6b))">
        <i class="fa-solid fa-address-card"></i> Salvar Contato
      </button>
      <button class="btn-elegant" id="btnShare" style="display:none">
        <i class="fa-solid fa-share-nodes"></i> Compartilhar
      </button>
    </div>
  `;
}

function setupVCard(cfg) {
  const btn = document.getElementById('btnSaveContact');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const phone = (cfg.links || []).find(l => l.type === 'phone' || l.type === 'whatsapp');
    const email = (cfg.links || []).find(l => l.type === 'email');
    const site  = (cfg.links || []).find(l => l.type === 'website');
    const lines = [
      'BEGIN:VCARD', 'VERSION:3.0',
      `FN:${cfg.name || ''}`,
      `TITLE:${cfg.profession || ''}`,
      phone ? `TEL;TYPE=CELL:${phone.value}` : '',
      email ? `EMAIL:${email.value}` : '',
      site  ? `URL:${site.value}` : '',
      'END:VCARD'
    ].filter(Boolean).join('\r\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lines], { type: 'text/vcard' }));
    a.download = `${(cfg.name || 'contato').replace(/\s+/g,'_')}.vcf`;
    a.click();
  });
}

function setupShare(cfg) {
  if (!navigator.share) return;
  const btn = document.getElementById('btnShare');
  if (!btn) return;
  btn.style.display = 'flex';
  btn.addEventListener('click', () => {
    navigator.share({ title: cfg.name, url: location.href }).catch(() => {});
  });
}

init();
</script>
</body>
</html>
